services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: password-manager-backend
    ports:
      - "5000:5000"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=__PUNE_AICI_JWT_SECRET__
      - ENCRYPTION_KEY=__PUNE_AICI_ENCRYPTION_KEY__
    restart: unless-stopped
    networks:
      - password-manager-network

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: password-manager-frontend
    ports:
      - "1532:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - password-manager-network

volumes:
  db-data:

networks:
  password-manager-network:
    driver: bridge
