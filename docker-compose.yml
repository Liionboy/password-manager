services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: password-manager-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - password-manager-network
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: password-manager-frontend
    ports:
      - "1532:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - password-manager-network

  postgres:
    image: postgres:15-alpine
    container_name: password-manager-db
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-passwordmanager}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - password-manager-network

volumes:
  pgdata:

networks:
  password-manager-network:
    driver: bridge
