name: Build & Push to Docker Hub

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract backend metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: adrianbrisca/password-manager
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Extract frontend metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: adrianbrisca/password-manager-frontend
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=

      # Backend
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan backend image
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.72.0 \
            image \
            --exit-code 1 \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            adrianbrisca/password-manager:latest

      - name: Push backend images
        run: |
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker push "$tag"
            fi
          done <<'EOF'
          ${{ steps.backend_meta.outputs.tags }}
          EOF

      # Frontend
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan frontend image
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.72.0 \
            image \
            --exit-code 1 \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            adrianbrisca/password-manager-frontend:latest

      - name: Push frontend images
        run: |
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker push "$tag"
            fi
          done <<'EOF'
          ${{ steps.frontend_meta.outputs.tags }}
          EOF
